x-spark-tuning: &spark-tuning
  SPARK_SHUFFLE_PARTITIONS: "4"
  KAFKA_MAX_POLL_RECORDS: "50000000"
  KAFKA_FETCH_MAX_BYTES: "2097152000"
  KAFKA_MAX_PARTITION_FETCH_BYTES: "1048576000"
  KAFKA_MIN_PARTITIONS: "${NUM_CORES:-24}"
  ABFS_WRITE_REQUEST_SIZE: "8388608"
  SPARK_CODEGEN_ENABLED: "true"
  KAFKA_CONSUMER_POLL_TIMEOUT_MS: "120000"
  KAFKA_FETCH_OFFSET_NUM_RETRIES: "10"
  KAFKA_FETCH_OFFSET_RETRY_INTERVAL_MS: "10"
  MIN_OFFSETS_PER_TRIGGER: "1"
  MAX_OFFSETS_PER_TRIGGER: "5000000"
  MAX_TRIGGER_DELAY: "1s"
  FAIL_ON_DATA_LOSS: "false"
  OUTPUT_COALESCE_PARTITIONS: "${NUM_CORES:-24}"
  ABFS_WRITE_MAX_CONCURRENT: "48"
  KAFKA_RECEIVE_BUFFER_BYTES: "10485760"
  KAFKA_FETCH_MIN_BYTES: "1"
  KAFKA_FETCH_MAX_WAIT_MS: "500"
  KAFKA_REQUEST_TIMEOUT_MS: "120000"
  KAFKA_SESSION_TIMEOUT_MS: "60000"
  CONSUMER_CACHE_CAPACITY: "2560"

x-flink-tuning: &flink-tuning
  FLINK_PARALLELISM: "${NUM_CORES:-24}"
  CHECKPOINT_INTERVAL_MS: "5000"
  KAFKA_MAX_POLL_RECORDS: "50000000"
  KAFKA_FETCH_MAX_BYTES: "2097152000"
  KAFKA_MAX_PARTITION_FETCH_BYTES: "1048576000"
  ABFS_WRITE_REQUEST_SIZE: "8388608"
  ABFS_WRITE_MAX_CONCURRENT: "48"
  KAFKA_RECEIVE_BUFFER_BYTES: "10485760"
  KAFKA_FETCH_MIN_BYTES: "1"
  KAFKA_FETCH_MAX_WAIT_MS: "500"
  KAFKA_REQUEST_TIMEOUT_MS: "120000"
  KAFKA_SESSION_TIMEOUT_MS: "60000"

services:
  producer-csharp:
    build: ./src/containers/producer-csharp
    cpus: 4
    mem_limit: 8g
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
    environment:
      - EVENTHUB_CONNECTION_STRING
      - EVENTHUB_NAME
      - SENDER_COUNT=${SENDER_COUNT:-32}
      - CLIENT_COUNT=${CLIENT_COUNT:-8}

  spark-consumer-35:
    build:
      context: ./src/containers/spark-consumer
      args:
        SBT_IMAGE: "sbtscala/scala-sbt:eclipse-temurin-17.0.15_6_1.12.6_2.12.21"
        SPARK_VERSION: "3.5.8"
        SCALA_VERSION: "2.12.18"
        DELTA_VERSION: "3.3.2"
        HADOOP_VERSION: "3.3.4"
    cpus: 32
    mem_limit: 128g
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 120
      start_period: 30s
    environment:
      <<: *spark-tuning
      JAVA_TOOL_OPTIONS: "-XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Xmx80g -Xms80g -XX:G1HeapRegionSize=16m -XX:ParallelGCThreads=8 -XX:ConcGCThreads=4"
      EVENTHUB_CONNECTION_STRING: ${EVENTHUB_CONNECTION_STRING}
      EVENTHUB_NAME: ${EVENTHUB_NAME}
      ADLSG2_ACCOUNT_NAME: ${ADLSG2_ACCOUNT_NAME}
      ADLSG2_ACCOUNT_KEY: ${ADLSG2_ACCOUNT_KEY}
      ADLSG2_CONTAINER: ${ADLSG2_CONTAINER}
      TRIGGER_INTERVAL: "0 seconds"
      CONSUMER_GROUP: spark35
      DELTA_TABLE_PATH: spark35/benchmark
      CHECKPOINT_PATH: "/tmp/spark-checkpoint"

  spark-consumer-42:
    build:
      context: ./src/containers/spark-consumer
      args:
        SBT_IMAGE: "sbtscala/scala-sbt:eclipse-temurin-17.0.15_6_1.12.6_2.13.18"
        SPARK_VERSION: "4.2.0-preview3"
        SCALA_VERSION: "2.13.18"
        DELTA_VERSION: "4.1.0"
        HADOOP_VERSION: "3.4.1"
    cpus: 32
    mem_limit: 128g
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 120
      start_period: 30s
    environment:
      <<: *spark-tuning
      JAVA_TOOL_OPTIONS: "-XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Xmx80g -Xms80g -XX:G1HeapRegionSize=16m -XX:ParallelGCThreads=8 -XX:ConcGCThreads=4"
      EVENTHUB_CONNECTION_STRING: ${EVENTHUB_CONNECTION_STRING}
      EVENTHUB_NAME: ${EVENTHUB_NAME}
      ADLSG2_ACCOUNT_NAME: ${ADLSG2_ACCOUNT_NAME}
      ADLSG2_ACCOUNT_KEY: ${ADLSG2_ACCOUNT_KEY}
      ADLSG2_CONTAINER: ${ADLSG2_CONTAINER}
      TRIGGER_INTERVAL: "0 seconds"
      CONSUMER_GROUP: spark42
      DELTA_TABLE_PATH: spark42/benchmark
      CHECKPOINT_PATH: "/tmp/spark-checkpoint"

  flink-consumer-116:
    build: ./src/containers/flink-consumer
    cpus: 32
    mem_limit: 128g
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 120
      start_period: 30s
    environment:
      <<: *flink-tuning
      JAVA_TOOL_OPTIONS: "-XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Xmx80g -Xms80g -XX:G1HeapRegionSize=16m -XX:ParallelGCThreads=8 -XX:ConcGCThreads=4"
      EVENTHUB_CONNECTION_STRING: ${EVENTHUB_CONNECTION_STRING}
      EVENTHUB_NAME: ${EVENTHUB_NAME}
      ADLSG2_ACCOUNT_NAME: ${ADLSG2_ACCOUNT_NAME}
      ADLSG2_ACCOUNT_KEY: ${ADLSG2_ACCOUNT_KEY}
      ADLSG2_CONTAINER: ${ADLSG2_CONTAINER}
      CONSUMER_GROUP: flink116
      DELTA_TABLE_PATH: flink1.16/benchmark
      CHECKPOINT_PATH: "/tmp/flink-checkpoint"

  kdi-consumer:
    build: ./src/containers/kdi-consumer
    cpus: 4
    mem_limit: 16g
    deploy:
      replicas: 8
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/kdi-healthy"]
      interval: 5s
      timeout: 5s
      retries: 120
      start_period: 60s
    environment:
      - EVENTHUB_CONNECTION_STRING
      - EVENTHUB_NAME
      - ADLSG2_ACCOUNT_NAME
      - ADLSG2_ACCOUNT_KEY
      - ADLSG2_CONTAINER
      - CONSUMER_GROUP=kdi
      - DELTA_TABLE_PATH=kdi/benchmark
      - ALLOWED_LATENCY=2
      - MAX_MESSAGES_PER_BATCH=50000
      - MIN_BYTES_PER_FILE=262144
      - KAFKA_FETCH_MIN_BYTES=1
      - KAFKA_FETCH_MAX_WAIT_MS=100
      - KAFKA_RECEIVE_BUFFER_BYTES=10485760
      - KAFKA_SESSION_TIMEOUT_MS=60000

  feldera-consumer:
    build: ./src/containers/feldera-consumer
    tty: true
    cpus: 32
    mem_limit: 128g
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/feldera-healthy"]
      interval: 5s
      timeout: 5s
      retries: 120
      start_period: 600s
    environment:
      - EVENTHUB_CONNECTION_STRING
      - EVENTHUB_NAME
      - ADLSG2_ACCOUNT_NAME
      - ADLSG2_ACCOUNT_KEY
      - ADLSG2_CONTAINER

  analytics-pyspark:
    build: ./src/containers/analytics-pyspark
    cpus: 32
    mem_limit: 128g
    volumes:
      - ./results:/opt/results
    environment:
      - ADLSG2_ACCOUNT_NAME
      - ADLSG2_ACCOUNT_KEY
      - ADLSG2_CONTAINER
      - DELTA_TABLE_PATH_35=spark35/benchmark
      - DELTA_TABLE_PATH_42=spark42/benchmark
      - DELTA_TABLE_PATH_FLINK116=flink1.16/benchmark
      - DELTA_TABLE_PATH_FELDERA=feldera/benchmark
      - DELTA_TABLE_PATH_KDI=kdi/benchmark
      - RESOURCE_STATS_PATH=resource_stats/resource_stats.csv
      - SPARK_DRIVER_MEMORY=64g
